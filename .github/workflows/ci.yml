name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: trace
          POSTGRES_PASSWORD: trace
          POSTGRES_DB: trace_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://trace:trace@localhost:5432/trace_test
      TEST_DATABASE_URL: postgresql+asyncpg://trace:trace@localhost:5432/trace_test
      LOG_LEVEL: DEBUG
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-packages
      - name: Lint
        run: |
          uv run ruff check sdk/ api/
          uv run ruff format --check sdk/ api/
      - name: Test API
        run: cd api && uv run pytest -x --tb=short
      - name: Test SDK
        run: cd sdk && uv run pytest -x --tb=short

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint .
      - run: npm test
