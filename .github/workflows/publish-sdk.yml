name: Publish SDK
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv build --package usetrace
      - run: uv publish dist/usetrace-*
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
