services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trace
      POSTGRES_USER: trace
      POSTGRES_PASSWORD: trace
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trace"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://trace:trace@postgres:5432/trace
      LOG_LEVEL: INFO
      CORS_ORIGINS: "http://localhost,http://localhost:5173"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  pgdata:
