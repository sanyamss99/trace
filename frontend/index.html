<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trace</title>
    <meta name="description" content="Trace — real-time causal debugger for LLM applications. Visualize attribution maps and answer 'Why did the LLM say that?'" />
    <meta name="theme-color" content="#6366f1" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Trace — Real-time Causal Debugger for LLM Apps" />
    <meta property="og:description" content="Add @trace to your LLM functions. Get visual attribution maps that answer 'Why did the LLM say that?'" />
    <meta property="og:url" content="https://use-trace.com" />
    <meta property="og:image" content="https://use-trace.com/og-preview.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Trace — Real-time Causal Debugger for LLM Apps" />
    <meta name="twitter:description" content="Add @trace to your LLM functions. Get visual attribution maps that answer 'Why did the LLM say that?'" />
    <meta name="twitter:image" content="https://use-trace.com/og-preview.svg" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <script>
      // Set data-theme before first paint to prevent flash
      (function() {
        var t;
        try { t = localStorage.getItem('trace_theme'); } catch(e) {}
        if (t !== 'light' && t !== 'dark') {
          t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-surface-primary text-text-primary antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
