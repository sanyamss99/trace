<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#161822"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="1200" y1="0" x2="1200" y2="630"/>
  </g>

  <!-- Attribution visualization bars (right side) -->
  <g transform="translate(720, 160)">
    <!-- Prompt label -->
    <text x="0" y="-20" fill="#6b7280" font-family="system-ui, sans-serif" font-size="13" font-weight="500">ATTRIBUTION MAP</text>

    <!-- Token bars with varying attribution strength -->
    <rect x="0" y="0" width="380" height="36" rx="6" fill="#6366f1" opacity="0.85"/>
    <text x="16" y="23" fill="#fff" font-family="monospace" font-size="14" font-weight="500">The capital of France is</text>
    <text x="340" y="23" fill="#c7d2fe" font-family="monospace" font-size="12">0.92</text>

    <rect x="0" y="48" width="280" height="36" rx="6" fill="#22c55e" opacity="0.7"/>
    <text x="16" y="71" fill="#fff" font-family="monospace" font-size="14" font-weight="500">system: geography expert</text>
    <text x="240" y="71" fill="#bbf7d0" font-family="monospace" font-size="12">0.71</text>

    <rect x="0" y="96" width="200" height="36" rx="6" fill="#f97316" opacity="0.6"/>
    <text x="16" y="119" fill="#fff" font-family="monospace" font-size="14" font-weight="500">context: Europe</text>
    <text x="160" y="119" fill="#fed7aa" font-family="monospace" font-size="12">0.54</text>

    <rect x="0" y="144" width="120" height="36" rx="6" fill="#6366f1" opacity="0.3"/>
    <text x="16" y="167" fill="#a5b4fc" font-family="monospace" font-size="14" font-weight="500">temp: 0.7</text>
    <text x="85" y="167" fill="#c7d2fe" font-family="monospace" font-size="12">0.18</text>

    <!-- Output arrow -->
    <text x="0" y="220" fill="#6b7280" font-family="system-ui, sans-serif" font-size="13" font-weight="500">OUTPUT</text>
    <rect x="0" y="232" width="380" height="40" rx="6" fill="#1e1e2e" stroke="#6366f1" stroke-width="1.5"/>
    <text x="16" y="258" fill="#e2e8f0" font-family="monospace" font-size="14">"Paris"</text>
    <text x="80" y="258" fill="#6b7280" font-family="monospace" font-size="12">← traced in 2.3ms</text>
  </g>

  <!-- Logo + text (left side) -->
  <g transform="translate(80, 180)">
    <!-- Logo mark -->
    <rect x="0" y="0" width="8" height="48" rx="4" fill="url(#accent)"/>
    <text x="24" y="40" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" letter-spacing="-1">Trace</text>

    <!-- Tagline -->
    <text x="0" y="90" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="22" font-weight="400">Why did the LLM say that?</text>

    <!-- Subtitle -->
    <text x="0" y="130" fill="#6b7280" font-family="system-ui, sans-serif" font-size="16">Real-time causal debugger for</text>
    <text x="0" y="155" fill="#6b7280" font-family="system-ui, sans-serif" font-size="16">LLM applications</text>

    <!-- Decorator hint -->
    <rect x="0" y="190" width="280" height="40" rx="8" fill="#1e1e2e" stroke="#2d2d3d" stroke-width="1"/>
    <text x="16" y="216" fill="#6366f1" font-family="monospace" font-size="15" font-weight="500">@trace</text>
    <text x="90" y="216" fill="#6b7280" font-family="monospace" font-size="15">→ visual attribution</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accent)" opacity="0.8"/>
</svg>
